<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>太公奇门排盘</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f171d;
      --panel: #142028;
      --text: #f5f1e8;
      --muted: #b8afa2;
      --gold: #d9a84d;
      --red: #ef3f46;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      width: min(880px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }
    .mark {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #17242d, #0b1116);
      border: 1px solid rgba(217, 168, 77, .45);
      color: var(--red);
      font-size: 44px;
      font-weight: 800;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 1.1;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 18px;
    }
    .links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 32px;
    }
    a {
      color: var(--gold);
      text-decoration: none;
    }
    .button {
      padding: 10px 14px;
      border: 1px solid rgba(217, 168, 77, .55);
      border-radius: 8px;
      color: var(--text);
    }
    section {
      margin-top: 56px;
      padding-top: 28px;
      border-top: 1px solid rgba(217, 168, 77, .18);
    }
    h2 {
      font-size: 22px;
      margin: 0 0 12px;
    }
    ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }
    footer {
      margin-top: 64px;
      color: #837b70;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">太</div>
    <h1>太公奇门排盘</h1>
    <p>面向奇门遁甲学习者和研究者的排盘工具，支持按时间生成盘面，辅助传统术数学习、记录与分析。</p>
    <p>本应用定位为传统文化与排盘辅助工具，不提供投资、医疗、法律等专业建议，也不承诺任何预测结果。</p>

    <div class="links">
      <a class="button" href="./support.html">支持与帮助</a>
      <a class="button" href="./privacy.html">隐私政策</a>
    </div>

    <section>
      <h2>主要功能</h2>
      <ul>
        <li>按时间生成奇门排盘。</li>
        <li>展示九宫、天盘、地盘、八门、九星、八神等信息。</li>
        <li>支持本地保存排盘记录，并可选择使用 iCloud 同步。</li>
      </ul>
    </section>

    <footer>© 2026 liang liu. All rights reserved.</footer>
  </main>
</body>
</html>
